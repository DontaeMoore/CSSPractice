<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="./design/style.css">
  <link href="https://fonts.google.com/specimen/Inter" rel="stylesheet">

  <title>Frontend Mentor | Social links profile</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>

  <div class="container">
  <div class="card">
    <div class="imgDiv">
      <img src="./assets/images/avatar-jessica.jpeg" alt="Profile Picture">
    </div>
  <div class="textPortion">
  <div class="name"><p>Jessica Randall</p></div>
  <div class="location"><p>London, United Kingdom</p></div>
  <div class="bio"><p>"Front-end developer and avid reader."</p></div>
  </div>
  <div class="linkArea">
  <p>GitHub</p>
  <p>Frontend Mentor</p>
  <p>LinkedIn</p>
  <p>Twitter</p>
  <p>Instagram</p>
  </div>

  </div>
  </div>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer>
</body>
</html>
